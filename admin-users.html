<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode transition-colors duration-500 overflow-x-hidden">

    <!-- Background Animation Elements -->
    <div class="app-background"></div>
    <div class="background-texture"></div>

    <!-- Navigation Bar -->
    <nav class="fixed top-6 w-full z-[1050] px-4">
        <div class="container mx-auto max-w-6xl">
            <div class="navbar-styled flex items-center justify-between px-8 py-3 rounded-[100px] border border-white/10 shadow-2xl backdrop-blur-2xl">
                <a class="flex items-center gap-3 no-underline" href="admin.html">
                    <div class="logo-box">👥</div>
                    <span class="logo-label text-xl font-extrabold tracking-tighter">USER REGISTRY</span>
                </a>
                <div class="flex items-center gap-3">
                    <button onclick="toggleMode()" class="action-icon-btn" id="modeToggle">
                        <span id="themeIcon">☀️</span>
                    </button>
                    <a href="admin.html" class="btn-primary-custom px-4 py-2 text-sm no-underline">← Dashboard</a>
                    <button class="hamburger-btn" id="hamburgerBtn" onclick="openMobileNav()" aria-label="Open menu">☰</button>
                </div>
            </div>
        </div>
    </nav>
    <!-- Mobile Nav Drawer -->
    <div class="mobile-nav-drawer" id="mobileNavDrawer">
        <div class="mobile-nav-overlay" onclick="closeMobileNav()"></div>
        <div class="mobile-nav-panel">
            <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
            <a class="mobile-nav-link" href="admin.html">← Dashboard</a>
            <a class="mobile-nav-link" href="index.html">🏠 Main Site</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="container-fluid py-32 px-md-5">
        <!-- User Management Table -->
        <div class="content-card p-4 p-md-5 shadow-2xl">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
                <div>
                    <h2 class="fw-bold tracking-tight m-0">Member <span class="text-violet-400">Database</span></h2>
                    <p class="opacity-50 small mt-1">Manage all registered cosmic pilots and access tiers</p>
                </div>
                <div class="d-flex flex-column flex-md-row gap-2 align-items-md-center">
                    <input type="text" id="userSearch" class="styled-input admin-table-search" placeholder="Search users..." oninput="renderUsersTable()">
                    <select id="userPlanFilter" class="styled-input admin-tier-filter" onchange="renderUsersTable()">
                        <option value="all">All plans</option>
                        <option value="free">Free</option>
                        <option value="premium">Premium</option>
                        <option value="admin">Admin</option>
                    </select>
                    <div class="bg-white/5 border border-white/10 rounded-2xl px-4 py-2 text-sm">
                        <span class="opacity-50">Total Users:</span> <span id="userCount" class="fw-bold text-violet-400">--</span>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Identity</th>
                            <th>Contact</th>
                            <th>Joined</th>
                            <th>Reader Details</th>
                            <th>Access Plan</th>
                            <th>Timeline</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- THEME MANAGEMENT ---
        // --- THEME SYNC ---
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('themePreference');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').innerText = '🌙';
            }
        }

        function toggleMode() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                themeIcon.innerText = '🌙';
                localStorage.setItem('themePreference', 'light');
            } else {
                themeIcon.innerText = '☀️';
                localStorage.setItem('themePreference', 'dark');
            }
        }

        // --- DATA FETCHING & RENDERING ---
        // --- DATA LOGIC ---
        const API_BASE = window.location.origin + '/api';
        const adminUser = JSON.parse(localStorage.getItem('user'));
        if (!adminUser || adminUser.role !== 'admin') {
            window.location.href = 'index.html';
        }
        let allUsersData = [];

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/admin/users`);
                const users = await res.json();
                allUsersData = users;
                renderUsersTable();
            } catch (e) { 
                console.error(e);
                alert("Critical: Signal lost with central database"); 
            }
        }

        function renderUsersTable() {
            const now = new Date();
            const query = (document.getElementById('userSearch')?.value || '').toLowerCase().trim();
            const plan = document.getElementById('userPlanFilter')?.value || 'all';
            const users = allUsersData.filter(user => {
                const matchesQuery = !query ||
                    String(user.username || '').toLowerCase().includes(query) ||
                    String(user.email || '').toLowerCase().includes(query) ||
                    String(user.favorite_author || '').toLowerCase().includes(query) ||
                    String(user.favorite_genre || '').toLowerCase().includes(query);
                const isPremium = String(user.membership_plan || 'free').toLowerCase() !== 'free';
                const matchesPlan = plan === 'all' ||
                    (plan === 'free' && !isPremium) ||
                    (plan === 'premium' && isPremium) ||
                    (plan === 'admin' && user.role === 'admin');
                return matchesQuery && matchesPlan;
            });

            document.getElementById('userCount').innerText = users.length;

            if (users.length === 0) {
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="10" class="text-center py-5 opacity-40">No matching users.</td></tr>';
                return;
            }

            document.getElementById('userTableBody').innerHTML = users.map(u => {
                    // Determine membership status based on end_date
                    let statusHtml = '<span class="text-muted">N/A</span>';
                    let statusClass = '';
                    
                    if (u.end_date) {
                        const expiry = new Date(u.end_date);
                        if (expiry > now) {
                            statusHtml = '<span class="status-pill active">● Active</span>';
                        } else {
                            statusHtml = '<span class="status-pill expired">● Expired</span>';
                        }
                    }

                    return `
                        <tr>
                            <td class="opacity-40 small">${u.id}</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="user-avatar-mini">${(u.username || 'U').charAt(0).toUpperCase()}</div>
                                    <span class="fw-bold">${u.username}</span>
                                </div>
                            </td>
                            <td class="small opacity-70">${u.email}</td>
                            <td class="small">${formatDate(u.created_at)}</td>
                            <td>
                                <div class="small">
                                    <div><span class="opacity-50">Age:</span> ${u.age || '-'}</div>
                                    <div><span class="opacity-50">Genre:</span> ${u.favorite_genre || '-'}</div>
                                    <div><span class="opacity-50">Author:</span> ${u.favorite_author || '-'}</div>
                                </div>
                            </td>
                            <td><span class="badge-plan">${(u.membership_plan || 'free').toUpperCase()}</span></td>
                            <td>
                                <div class="timeline-box">
                                    <span>${formatDate(u.start_date)}</span>
                                    <span class="opacity-30 mx-1">→</span>
                                    <span class="${statusHtml.includes('Expired') ? 'text-red-400' : ''}">${formatDate(u.end_date)}</span>
                                </div>
                            </td>
                            <td><span class="role-tag">${u.role}</span></td>
                            <td>${statusHtml}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">
                                    Remove
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
        }

        // --- USER DELETION LOGIC ---
        async function deleteUser(id) {
            if(!confirm("Are you sure you want to remove this user? This action cannot be undone.")) return;
            const res = await fetch(`${API_BASE}/admin/delete-user/${id}`, { method: 'DELETE' });
            if(res.ok) {
                loadUsers();
            }
        }
        

        function openMobileNav() {
            document.getElementById('mobileNavDrawer').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeMobileNav() {
            document.getElementById('mobileNavDrawer').classList.remove('open');
            document.body.style.overflow = '';
        }
        window.onload = () => {
            applySavedTheme();
            loadUsers();
        };
    </script>
</body>
</html>
